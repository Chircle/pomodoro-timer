name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            # Universal binary: runs on both Intel and Apple Silicon
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Required for universal macOS binary
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release via Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUILD: '1'
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Pomodoro Timer ${{ github.ref_name }}'
          releaseBody: |
            ## Pomodoro Timer – Desktop App

            Native desktop app built with [Tauri](https://tauri.app/) + Next.js.

            ### Features
            - 🍅 Animated shader backgrounds (focus vs. break phase)
            - ⏱ Circular countdown ring + round tracker dots
            - 🎵 Ambient music with crossfade, background-tab safe
            - 🔔 Synthesized ding alert in the final seconds of each phase
            - ⚙️ Configurable focus duration and number of rounds

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | Windows  | `.msi` | Recommended installer |
            | Windows  | `_x64-setup.exe` | NSIS alternative |
            | macOS    | `.dmg` | Universal – Intel + Apple Silicon |

            > First launch on macOS: right-click → Open to bypass Gatekeeper (app is not notarized).
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
